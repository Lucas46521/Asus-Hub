app-id: de.guido.asus-hub
runtime: org.gnome.Platform
runtime-version: '46'
sdk: org.gnome.Sdk
command: asus-hub
finish-args:
  # UI Framework
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  # Erlaubt das Speichern von App-Einstellungen im User-Verzeichnis
  - --persist=.config/asus-hub
  # KRITISCH: Wir brauchen System-Bus Zugriff, um Hardware-Einstellungen vorzunehmen
  - --socket=system-bus

modules:
  - name: asus-hub
    buildsystem: simple
    build-options:
      append-env:
        CARGO_HOME: /run/build/asus-hub/cargo
    build-commands:
      # Rust Offline Build
      - cargo --offline fetch --manifest-path Cargo.toml --locked
      - cargo --offline build --release --locked

      # Binaries und Assets ins Flatpak-System kopieren
      - install -Dm755 target/release/asus-hub -t /app/bin/
      - install -Dm644 packaging/de.guido.asus-hub.desktop -t /app/share/applications/
      - install -Dm644 packaging/de.guido.asus-hub.metainfo.xml -t /app/share/metainfo/
      - install -Dm644 assets/trayicon.png /app/share/icons/hicolor/128x128/apps/de.guido.asus-hub.png

      # Flathub verlangt, dass die Lizenz installiert wird
      - install -Dm644 LICENSE -t /app/share/licenses/de.guido.asus-hub/

    sources:
      - type: git
        url: https://github.com/Traciges/Asus-Hub.git
        branch: main
      - cargo-sources.json
